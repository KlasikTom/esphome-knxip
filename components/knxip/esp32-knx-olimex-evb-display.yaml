esphome:
  name: "esp32-knx-olimex-evb-display"

esp32:
  board: esp32dev
  variant: esp32
  framework:
    type: arduino

external_components:
  - source:
      type: git
      url: https://github.com/KlasikTom/esphome-knxip
    refresh: 300s
    components: [ knxip ]

# ── KNX/IP ────────────────────────────────────────────────────────────────────
knxip:
  id: knxip_comp
  individual_address: "1.1.1"

# ── Test interval ─────────────────────────────────────────────────────────────
interval:
  - interval: 15s
    then:
      - lambda: |-
          float temp = 15.0f + (esp_random() % 150) / 10.0f;
          id(knxip_comp).send_dpt9("1/3/1", temp);
          ESP_LOGI("test", "Posilam teplotu: %.1f C", temp);

# ── KNX senzor ────────────────────────────────────────────────────────────────
sensor:
  - platform: knxip
    id: temp_sensor
    name: "Teplota"
    group_address: "1/2/10"
    dpt: "9"
    unit_of_measurement: "°C"

# ── KNX switch → relé GPIO32 ──────────────────────────────────────────────────
# ESP32-EVB relé je na GPIO32
# group_address_state vynechán → čistě optimistic (publish ihned bez feedback)
switch:
  - platform: knxip
    id: knx_light
    name: "Rele"
    group_address_command: "1/1/1"
    # group_address_state: "1/1/2"  # odkomentuj pokud máš feedback ze sběrnice
    pin:
      number: GPIO32

# ── BUT1 → toggle relé ────────────────────────────────────────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO34
      inverted: true
      mode:
        input: true
    name: "BUT1"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      - switch.toggle: knx_light

# ── WiFi ──────────────────────────────────────────────────────────────────────
